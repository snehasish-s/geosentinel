version: '3.8'

services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - geosentinel

  server:
    build:
      context: ./server
      dockerfile: ../Dockerfile
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/geosentinel
      - PORT=5000
      - JWT_SECRET=geosentinel_jwt_secret_key_2026
      - FRONTEND_URL=http://localhost:5173
      - NODE_ENV=development
    depends_on:
      - mongodb
    networks:
      - geosentinel

  client:
    build:
      context: ./client
    ports:
      - "5173:80"
    depends_on:
      - server
    networks:
      - geosentinel

volumes:
  mongo-data:

networks:
  geosentinel:
    driver: bridge